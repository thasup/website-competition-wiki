<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Page, soft, frost, warm interlude, dark & deep bands" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--border-default); }
  .n { font: var(--type-micro); color: var(--text-muted); margin-top: 8px; }
  .h { font: var(--type-micro); color: var(--text-faint); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--tdv-canvas)"></div><div class="n">page</div><div class="h">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-canvas-soft)"></div><div class="n">soft</div><div class="h">#F6F8FA</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-canvas-frost)"></div><div class="n">frost</div><div class="h">#EEF0F2</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-canvas-warm)"></div><div class="n">warm</div><div class="h">#F4E9E2</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-canvas-dark)"></div><div class="n">dark</div><div class="h">#272428</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-canvas-deep)"></div><div class="n">deep</div><div class="h">#003849</div></div>
</body>
</html>
