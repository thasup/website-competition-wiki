<!-- @dsCard group="Brand" viewport="700x260" name="The Orb" subtitle="Signature light source — white hotspot → Cerulean → Viridian edge, soft glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; height: 260px; display: flex; align-items: center; gap: 48px;
         padding: 0 56px; background: var(--surface-deep); }
  .orb { width: 150px; height: 150px; flex: none;
         filter: drop-shadow(var(--orb-glow)); }
  .note { color: var(--on-dark, #fff); max-width: 320px; }
  .note h4 { color: #fff; font: var(--type-heading-md); margin-bottom: 8px; }
  .note p { color: var(--tdv-on-dark-mute); font: var(--type-body-sm); }
</style>
</head>
<body>
  <img class="orb" src="../assets/terra-orb.png" alt="Terra orb">
  <div class="note">
    <h4>Terra Orb</h4>
    <p>The focal light of every hero. Drifts slowly with a soft glow to satisfy the signature animated moment. Never recolored, flattened, or outlined.</p>
  </div>
</body>
</html>
