<!-- @dsCard group="Type" viewport="700x300" name="Display tier" subtitle="Poppins SemiBold, tightened tracking — headline scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  .spec { margin-left: auto; font: var(--type-caption); color: var(--text-faint);
          font-variant-numeric: tabular-nums; white-space: nowrap; }
  .d { color: var(--text-strong); letter-spacing: var(--track-display); }
</style>
</head>
<body>
  <div class="row"><span class="d" style="font:var(--type-display-xxl)">Infrastructure</span><span class="spec">display-xxl · 56 / 600</span></div>
  <div class="row"><span class="d" style="font:var(--type-display-lg)">Ventures that compound</span><span class="spec">display-lg · 32 / 600</span></div>
  <div class="row"><span class="d" style="font:var(--type-display-md)">Built on Terra rails</span><span class="spec">display-md · 26 / 600</span></div>
  <div class="row"><span class="d" style="font:var(--type-heading-lg)">Section heading large</span><span class="spec">heading-lg · 22 / 600</span></div>
</body>
</html>
