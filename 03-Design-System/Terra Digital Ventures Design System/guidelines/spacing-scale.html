<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; display: flex; align-items: flex-end; gap: 18px; }
  .u { text-align: center; }
  .bar { background: var(--tdv-cerulean); border-radius: var(--radius-xs); width: 100%; }
  .u .box { display: flex; align-items: flex-end; height: 72px; }
  .n { font: var(--type-caption); color: var(--text-muted); margin-top: 8px; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="u" style="width:20px"><div class="box"><div class="bar" style="height:4px"></div></div><div class="n">4</div></div>
  <div class="u" style="width:20px"><div class="box"><div class="bar" style="height:8px"></div></div><div class="n">8</div></div>
  <div class="u" style="width:24px"><div class="box"><div class="bar" style="height:12px"></div></div><div class="n">12</div></div>
  <div class="u" style="width:28px"><div class="box"><div class="bar" style="height:16px"></div></div><div class="n">16</div></div>
  <div class="u" style="width:36px"><div class="box"><div class="bar" style="height:24px"></div></div><div class="n">24</div></div>
  <div class="u" style="width:44px"><div class="box"><div class="bar" style="height:32px"></div></div><div class="n">32</div></div>
  <div class="u" style="width:60px"><div class="box"><div class="bar" style="height:48px"></div></div><div class="n">48</div></div>
  <div class="u" style="width:76px"><div class="box"><div class="bar" style="height:64px"></div></div><div class="n">64</div></div>
</body>
</html>
