<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; }
  .wrap { display: flex; gap: 0; }
  .cell { flex: 1; display: flex; align-items: center; justify-content: center; height: 220px; }
  .light { background: var(--surface-page); }
  .frost { background: var(--tdv-frost); }
  .warm  { background: var(--surface-warm); }
  .cell img { width: 150px; height: auto; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell light"><img src="../assets/terra-logo-dark.png" alt="terra"></div>
    <div class="cell frost"><img src="../assets/terra-logo-dark.png" alt="terra"></div>
    <div class="cell warm"><img src="../assets/terra-logo-dark.png" alt="terra"></div>
  </div>
</body>
</html>
