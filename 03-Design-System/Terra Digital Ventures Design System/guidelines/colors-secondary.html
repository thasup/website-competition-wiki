<!-- @dsCard group="Colors" viewport="700x180" name="Secondary — earth palette" subtitle="Mesh & data-viz ONLY — never buttons or body text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 84px; border-radius: var(--radius-sm); }
  .n { font: var(--type-body-sm); color: var(--text-strong); margin-top: 8px; font-weight: var(--fw-medium); }
  .h { font: var(--type-micro); color: var(--text-faint); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--tdv-light-tawny)"></div><div class="n">Light Tawny</div><div class="h">#E7D6CD</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-laurel)"></div><div class="n">Laurel</div><div class="h">#C4D9DA</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-swamp)"></div><div class="n">Swamp</div><div class="h">#357887</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-viridian)"></div><div class="n">Viridian</div><div class="h">#003849</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-sienna)"></div><div class="n">Sienna</div><div class="h">#7C4B3C</div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-terracotta)"></div><div class="n">Terra Cotta</div><div class="h">#752A19</div></div>
</body>
</html>
