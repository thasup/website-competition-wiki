<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; }
  .wrap { display: flex; gap: 0; }
  .cell { flex: 1; display: flex; align-items: center; justify-content: center; height: 220px; }
  .taupe { background: var(--surface-dark); }
  .deep  { background: var(--surface-deep); }
  .cerul { background: var(--tdv-cerulean); }
  .cell img { width: 150px; height: auto; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell taupe"><img src="../assets/terra-logo-light.png" alt="terra"></div>
    <div class="cell deep"><img src="../assets/terra-logo-light.png" alt="terra"></div>
    <div class="cell cerul"><img src="../assets/terra-logo-light.png" alt="terra"></div>
  </div>
</body>
</html>
