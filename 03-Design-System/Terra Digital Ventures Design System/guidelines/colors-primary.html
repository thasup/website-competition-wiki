<!-- @dsCard group="Colors" viewport="700x180" name="Primary brand" subtitle="Cerulean (the only fill), Taupe ink, Frost neutral" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden;
        border: 1px solid var(--border-default); }
  .chip { height: 92px; }
  .meta { padding: 10px 12px; }
  .meta .n { font: var(--type-heading-sm); color: var(--text-strong); }
  .meta .h { font: var(--type-caption); color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .meta .p { font: var(--type-micro); color: var(--text-faint); }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--tdv-cerulean)"></div>
    <div class="meta"><div class="n">Cerulean</div><div class="h">#529BC9</div><div class="p">Pantone 2925 C</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-taupe)"></div>
    <div class="meta"><div class="n">Taupe</div><div class="h">#272428</div><div class="p">Pantone 426 C</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--tdv-frost)"></div>
    <div class="meta"><div class="n">Frost</div><div class="h">#E7E7E7</div><div class="p">Cool Gray 1 C</div></div></div>
</body>
</html>
